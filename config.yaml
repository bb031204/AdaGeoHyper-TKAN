# ================================================================
# AdaGeoHyper-TKAN 项目配置文件
# 用于多站点气象时空序列预测
# ================================================================

# ---- 数据相关 ----
data:
  dataset_name: "temperature"          # 可选: temperature / cloud_cover / humidity / component_of_wind
  data_root: "D:/bishe/WYB"            # 数据根目录
  input_len: 12                         # 输入时间步长
  pred_len: 12                          # 预测时间步长
  num_stations: null                    # null=使用全部站点(2048)，或指定如 512, 1024
  sample_ratio: 1.0                     # 训练集样本抽样比例 (0~1)
  val_sample_ratio: 1.0                 # 验证集样本抽样比例
  test_sample_ratio: 1.0               # 测试集样本抽样比例
  include_context: false                # 是否使用 context 特征

# ---- 超图相关 ----
hypergraph:
  k_neighbors: 8                        # K近邻数量
  lambda_geo: 1.0                       # 地理平面距离权重
  lambda_alt: 0.5                       # 海拔差权重
  use_hypergraph_cache: true            # 是否使用超图缓存
  cache_dir: "cache"                    # 缓存目录
  summary_pool: "mean"                  # 状态摘要方式: mean / last / linear
  scorer_hidden_dim: 32                 # 打分函数隐藏维度

# ---- 模型相关 ----
model:
  hidden_dim: 64                        # 空间模块隐藏维度
  tkan_hidden_dim: 64                   # TKAN 隐藏维度
  tkan_layers: 2                        # TKAN 层数
  tkan_sub_kan_configs: [null, 3]       # TKAN 子 KAN 配置 (null=默认, int=spline_order)
  dropout: 0.1                          # Dropout 比率
  fusion_dim: 64                        # 融合层维度
  kan_grid_size: 5                      # KAN B-spline 网格大小
  kan_spline_order: 3                   # KAN B-spline 阶数
  hypergraph_layers: 2                  # 超图卷积层数

# ---- 训练相关 ----
training:
  batch_size: 32                        # 批大小
  epochs: 100                           # 最大训练轮数
  learning_rate: 0.001                  # 学习率
  weight_decay: 0.0001                  # 权重衰减
  device: "auto"                        # auto / cuda / cpu
  seed: 42                              # 随机种子
  patience: 15                          # 早停耐心值
  use_early_stop: true                  # 是否使用早停
  scheduler: "cosine"                   # 学习率调度: cosine / step / none
  scheduler_step_size: 20               # StepLR 步长
  scheduler_gamma: 0.5                  # StepLR 衰减因子
  grad_clip: 1.0                        # 梯度裁剪阈值

# ---- 输出相关 ----
output:
  output_dir: "D:/bishe/AdaGeoHyper-TKAN/outputs"  # 输出目录
  save_best_only: true                  # 是否只保存最佳模型
  resume_from_checkpoint: null          # 恢复训练的 checkpoint 路径 (null=不恢复)
  log_interval: 10                      # 每多少个 batch 打印一次日志
